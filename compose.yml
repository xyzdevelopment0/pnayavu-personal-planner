services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-planner-postgres
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
